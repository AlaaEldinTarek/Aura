name: aura_app
description: Aura (هالة) - A 2-in-1 productivity and spiritual app combining Task Management and Prayer System.
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  table_calendar: ^3.0.9

  # State Management
  flutter_riverpod: ^2.4.9
  equatable: ^2.0.5

  # Localization
  easy_localization: ^3.0.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Authentication & Database
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.1
  firebase_analytics: ^11.0.0

  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.0
  share_plus: ^7.0.0
  dio: ^5.0.0
  url_launcher: ^6.2.1

  # Prayer Times & Location
  adhan: ^2.0.0+1
  geolocator: ^10.1.0
  permission_handler: ^11.2.1
  flutter_local_notifications: ^17.0.0
  wakelock_plus: ^1.4.0
  vibration: ^2.0.0
  timezone: ^0.9.4

  # Sensors & Compass
  flutter_compass: ^0.8.0
  sensors_plus: ^4.0.2
  geocoding: ^3.0.0

  # Utils
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  connectivity_plus: ^6.0.3
  audioplayers: ^6.0.0
  fl_chart: ^1.2.0
  dynamic_color: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/translations/
    - assets/audio/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

# App Icons Configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
